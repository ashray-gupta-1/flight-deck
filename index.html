<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0A0A0A;color:#EDEDED;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;-webkit-font-smoothing:antialiased}
.gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:340px;text-align:center}
.logo{width:52px;height:52px;border-radius:14px;background:#6E62E5;display:grid;place-items:center;margin:0 auto 18px;font-size:26px}
h1{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px}
p{font-size:13px;color:#8A8A8A;margin-bottom:22px}
input{width:100%;height:46px;background:#141414;border:1px solid #262626;border-radius:12px;color:#EDEDED;padding:0 14px;font-size:16px;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:#6E62E5;box-shadow:0 0 0 3px #211F3D}
button{width:100%;height:46px;margin-top:10px;background:#6E62E5;border:0;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:filter .15s}
button:active{filter:brightness(.9)}
.row{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:14px;font-size:13px;color:#8A8A8A}
.err{color:#FF9B9E;font-size:13px;min-height:18px;margin-top:12px}
.spin{display:none;font-size:13px;color:#8A8A8A;margin-top:14px}
</style>
</head>

    </form>
  </div>
</div>

if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}
function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)})}
async function decrypt(pass){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(P.salt),iterations:P.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(P.iv)},key,b64(P.data));
  return new TextDecoder().decode(pt);
}
function render(html){try{sessionStorage.setItem("fd_sig",FD_SIG)}catch(e){}document.open();document.write(html);document.close();}
async function tryPass(pass,remember){
  document.getElementById("spin").style.display="block";
  document.getElementById("err").textContent="";
  try{
    var html=await decrypt(pass);
    if(remember){try{localStorage.setItem("fd_pass",pass)}catch(e){}}
    render(html);
  }catch(e){
    document.getElementById("spin").style.display="none";
    document.getElementById("err").textContent="Wrong passphrase.";
    try{localStorage.removeItem("fd_pass")}catch(e2){}
  }
}
document.getElementById("f").addEventListener("submit",function(e){
  e.preventDefault();
  tryPass(document.getElementById("pw").value,document.getElementById("rm").checked);
});
(function(){var s;try{s=localStorage.getItem("fd_pass")}catch(e){}; if(s){tryPass(s,true);}})();
